<svg xmlns="http://www.w3.org/2000/svg" width="768" height="452" viewBox="0 0 768 452" role="img" aria-label="A Loop turning a failing test green: plan, act, observe (fail), reflect, plan, act, observe (pass), done">
<style>
  .win { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
  text { dominant-baseline: middle; }
  .ln { opacity: 1; }

  @keyframes rev0 { 0%{opacity:0} 0.00%{opacity:0} 1.50%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l0 { animation: rev0 16s linear infinite; }
  @keyframes rev1 { 0%{opacity:0} 5.00%{opacity:0} 6.50%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l1 { animation: rev1 16s linear infinite; }
  @keyframes rev2 { 0%{opacity:0} 6.88%{opacity:0} 8.38%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l2 { animation: rev2 16s linear infinite; }
  @keyframes rev3 { 0%{opacity:0} 11.88%{opacity:0} 13.38%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l3 { animation: rev3 16s linear infinite; }
  @keyframes rev4 { 0%{opacity:0} 13.75%{opacity:0} 15.25%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l4 { animation: rev4 16s linear infinite; }
  @keyframes rev5 { 0%{opacity:0} 20.00%{opacity:0} 21.50%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l5 { animation: rev5 16s linear infinite; }
  @keyframes rev6 { 0%{opacity:0} 27.50%{opacity:0} 29.00%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l6 { animation: rev6 16s linear infinite; }
  @keyframes rev7 { 0%{opacity:0} 36.88%{opacity:0} 38.38%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l7 { animation: rev7 16s linear infinite; }
  @keyframes rev8 { 0%{opacity:0} 46.25%{opacity:0} 47.75%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l8 { animation: rev8 16s linear infinite; }
  @keyframes rev9 { 0%{opacity:0} 52.50%{opacity:0} 54.00%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l9 { animation: rev9 16s linear infinite; }
  @keyframes rev10 { 0%{opacity:0} 60.00%{opacity:0} 61.50%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l10 { animation: rev10 16s linear infinite; }
  @keyframes rev11 { 0%{opacity:0} 67.50%{opacity:0} 69.00%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l11 { animation: rev11 16s linear infinite; }
  @keyframes rev12 { 0%{opacity:0} 75.00%{opacity:0} 76.50%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l12 { animation: rev12 16s linear infinite; }
  @keyframes rev13 { 0%{opacity:0} 77.50%{opacity:0} 79.00%{opacity:1} 96%{opacity:1} 99%{opacity:0} 100%{opacity:0} }
  .l13 { animation: rev13 16s linear infinite; }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .cursor { animation: blink 1s steps(1) infinite; }</style>
<rect x="0.5" y="0.5" width="767" height="451" rx="12" fill="#0b0f14" stroke="#1c2630"/>
<rect x="0.5" y="0.5" width="767" height="40" rx="12" fill="#0d141b"/>
<rect x="0.5" y="28" width="767" height="13" fill="#0d141b"/>
<circle cx="24" cy="20" r="6" fill="#ff5f56"/><circle cx="44" cy="20" r="6" fill="#ffbd2e"/><circle cx="64" cy="20" r="6" fill="#27c93f"/>
<text x="384" y="21" text-anchor="middle" font-size="12.5" fill="#5c6b7a" font-family="ui-monospace, monospace">loop — fix_test.loop</text>
<g class="win" xml:space="preserve">
<text class="ln l0" y="70" font-size="15"><tspan x="26" fill="#5fd38a">$ </tspan><tspan fill="#cdd8e4">loop run examples/fix_test.loop</tspan></text>
<text class="ln l2" y="122" font-size="15"><tspan x="26" fill="#37d4c4">↻ loop </tspan><tspan fill="#cdd8e4">"the checkout tax test passes"</tspan></text>
<text class="ln l4" y="174" font-size="15"><tspan x="26" fill="#37d4c4">  • plan     </tspan><tspan fill="#6b7c8c">read cart/total.ts, tax.ts</tspan></text>
<text class="ln l5" y="200" font-size="15"><tspan x="26" fill="#37d4c4">  • act      </tspan><tspan fill="#6b7c8c">edit total.ts</tspan></text>
<text class="ln l6" y="226" font-size="15"><tspan x="26" fill="#37d4c4">  • observe  </tspan><tspan fill="#ff6b6b">✗ FAIL </tspan><tspan fill="#cdd8e4">checkout.spec.ts::tax</tspan><tspan fill="#6b7c8c">  expected 8.25, got 8.20</tspan></text>
<text class="ln l7" y="252" font-size="15"><tspan x="26" fill="#ffb454">  ↺ reflect  </tspan><tspan fill="#ffb454">tax is applied after rounding — apply it before</tspan></text>
<text class="ln l8" y="278" font-size="15"><tspan x="26" fill="#37d4c4">  • plan     </tspan><tspan fill="#6b7c8c">tax the subtotal, then round</tspan></text>
<text class="ln l9" y="304" font-size="15"><tspan x="26" fill="#37d4c4">  • act      </tspan><tspan fill="#6b7c8c">edit total.ts</tspan></text>
<text class="ln l10" y="330" font-size="15"><tspan x="26" fill="#37d4c4">  • observe  </tspan><tspan fill="#5fd38a">✓ PASS </tspan><tspan fill="#cdd8e4">checkout.spec.ts::tax</tspan></text>
<text class="ln l11" y="356" font-size="15"><tspan x="26" fill="#37d4c4">  ■ stop     </tspan><tspan fill="#6b7c8c">goal met · 2 tries · no human needed</tspan></text>
<text class="ln l13" y="408" font-size="15"><tspan x="26" fill="#5fd38a">✓ done</tspan></text>
<rect class="cursor" x="324" y="61" width="8" height="16" fill="#5fd38a"/>
</g>
</svg>
